<nav class="{% if page.title == "Home" %}nav-home{% else %}nav{% endif %}" aria-label="Primary">
    <ul class="list">
        <li class="item">
            <a class="link" href="{{ site.url }}/" {% if page.title == "Home" %}aria-current="page"{% endif %}>Home</a>
        </li>

        {% if site.blog == true %}
            <li class="item">
                <a class="link" href="{{ site.url }}/blog" {% if page.title == "Blog" %}aria-current="page"{% endif %}>Blog</a>
            </li>
        {% endif %}

        {% if site.projects == true %}
            <li class="item">
                <a class="link" href="{{ site.url }}/projects" {% if page.title == "Projects" %}aria-current="page"{% endif %}>Projects</a>
            </li>
        {% endif %}

        {% if site.about == true %}
            <li class="item">
                <a class="link" href="{{ site.url }}/about" {% if page.title == "About" %}aria-current="page"{% endif %}>About</a>
            </li>
        {% endif %}
    </ul>
</nav>
