<section class="author{% if site.disqus == false %} no-disqus{% endif %}">
    {% assign share_url = page.url | absolute_url %}
    {% capture share_text %}{{ page.title }} {{ share_url }}{% endcapture %}
    <div class="toleft">
        <img class="selfie" src="{% if site.external-image == true %}{{ site.picture }}{% else %}{{ site.url }}/{{ site.picture }}{% endif %}" alt="{{ site.name }}">
    </div>

    <div class="toright">
        <h4 class="name">{{ site.name }}</h4>
        <p class="bio">{{ site.bio }}</p>

        <div class="share">
            <a class="share-x" href="https://twitter.com/intent/tweet?text={{ share_text | strip | uri_escape }}" target="_blank" rel="noopener noreferrer">
                <svg class="icon icon-x"><use xlink:href="#icon-x"></use></svg><span>X</span>
            </a>

            <a class="share-bluesky" href="https://bsky.app/intent/compose?text={{ share_text | strip | uri_escape }}" target="_blank" rel="noopener noreferrer">
                <svg class="icon icon-bsky"><use xlink:href="#icon-bsky"></use></svg><span>Bluesky</span>
            </a>
        </div>
    </div>
</section>
